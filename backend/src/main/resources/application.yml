server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # update ?????????????????? (??????????????)
    hibernate:
      ddl-auto: update
    show-sql: true # ????? SQL ???????
    database-platform: org.hibernate.dialect.MySQL8Dialect

file:
  # 优化：使用相对路径或 Linux 临时目录，避免 E:/ 这种 Windows 路径
  upload-path: ${UPLOAD_PATH:/tmp/uploads/}

# 优化：新增一个变量用于存储图片访问的域名
app:
  image-base-url: ${IMAGE_BASE_URL:http://localhost:8080/uploads/}
